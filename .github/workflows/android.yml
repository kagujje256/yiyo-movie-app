name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug 2>&1 | tee /tmp/gradle.log
          exit ${PIPESTATUS[0]}

      - name: Upload build logs (even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/gradle.log

      - name: Find APK
        run: find app/build -name "*.apk" -type f || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: yiyo-movie-app-debug
          path: app/build/outputs/apk/debug/*.apk
